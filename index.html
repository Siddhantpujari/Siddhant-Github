<!DOCTYPE html>
<html>
<head>
<title>Sharp Mindset Block Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#222;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#game{
display:grid;
grid-template-columns:repeat(10,40px);
grid-gap:2px;
justify-content:center;
margin-top:30px;
}

.block{
width:40px;
height:40px;
background:#444;
cursor:pointer;
}

.block:hover{
background:#666;
}

</style>

</head>

<body>

<h1>Sharp Mindset Block Game</h1>
<p>Click blocks to build your idea world</p>

<div id="game"></div>

<script>

let game = document.getElementById("game");

for(let i=0;i<100;i++){

let block = document.createElement("div");
block.className="block";

block.onclick=function(){

if(block.style.background=="green"){
block.style.background="#444";
}else{
block.style.background="green";
}

}

game.appendChild(block);

}

</script>

</body>
</html>
